services:
  openclaw-${INSTANCE_NAME}:
    container_name: openclaw-${INSTANCE_NAME}
    # 升级时同步更新 init.sh 中的飞书插件版本，保持两者一致
    image: ghcr.io/openclaw/openclaw:2026.6.1
    environment:
      HOME: /home/node
      # 禁用 mDNS/Bonjour 局域网广播，服务器环境不需要
      OPENCLAW_DISABLE_BONJOUR: "1"
      TZ: Asia/Shanghai
      # openai-image-gen skill 用的生图专用 API
      OPENAI_API_KEY: ${IMAGE_API_KEY}
      OPENAI_BASE_URL: ${IMAGE_API_URL}
    volumes:
      # 配置目录挂载，openclaw.json 及运行时数据存放于此
      - ./data:/home/node/.openclaw
    ports:
      - "${INSTANCE_PORT}:18789"
    # 使用 tini 作为 PID 1，确保信号正确转发和僵尸进程回收
    init: true
    restart: unless-stopped
    networks:
      - openclaw-${INSTANCE_NAME}-net
    command:
      ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789", "--verbose", "--ws-log", "compact"]
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-${INSTANCE_NAME}-scheduler:
    container_name: openclaw-${INSTANCE_NAME}-scheduler
    build:
      context: ./scheduler
    environment:
      TZ: Asia/Shanghai
      PYTHONPATH: /home/node/.openclaw/workspace/deps/python
      PYTHONPYCACHEPREFIX: /home/node/.openclaw/workspace/cache/pycache
      PYTHONUNBUFFERED: "1"
    volumes:
      # 与 openclaw-${INSTANCE_NAME} 共享同一份 workspace，crontab/jobs/logs 都在这里
      - ./data:/home/node/.openclaw
    # 与 openclaw-${INSTANCE_NAME} 容器内的 node 用户 (uid 1000) 保持一致，
    # 避免写入 workspace 的日志/缓存文件变成 root 所有
    user: "1000:1000"
    init: true
    restart: unless-stopped
    networks:
      - openclaw-${INSTANCE_NAME}-net

networks:
  openclaw-${INSTANCE_NAME}-net:
