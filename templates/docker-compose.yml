services:
  openclaw-${INSTANCE_NAME}:
    container_name: openclaw-${INSTANCE_NAME}
    image: alpine/openclaw:2026.6.1
    environment:
      HOME: /home/node
      # 禁用 mDNS/Bonjour 局域网广播，服务器环境不需要
      OPENCLAW_DISABLE_BONJOUR: "1"
      TZ: Asia/Shanghai
    volumes:
      # 配置目录挂载，openclaw.json 及运行时数据存放于此
      - ./data:/home/node/.openclaw
    ports:
      - "${INSTANCE_PORT}:18789"
    # 使用 tini 作为 PID 1，确保信号正确转发和僵尸进程回收
    init: true
    restart: unless-stopped
    networks:
      - openclaw-${INSTANCE_NAME}-net
    command:
      ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  openclaw-${INSTANCE_NAME}-net:
