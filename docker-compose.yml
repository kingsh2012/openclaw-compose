services:
  openclaw-gateway:
    container_name: openclaw-gateway
    image: alpine/openclaw:2026.5.22
    environment:
      HOME: /home/node
      OPENCLAW_DISABLE_BONJOUR: "1"
      TZ: Asia/Shanghai
    volumes:
      - ./data:/home/node/.openclaw
    ports:
      - "18789:18789"
    init: true
    restart: unless-stopped
    depends_on:
      - chrome
    networks:
      - openclaw-net
    command:
      ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  chrome:
    image: lscr.io/linuxserver/chromium:latest
    container_name: openclaw-chromedp
    restart: unless-stopped
    shm_size: 2gb
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - CUSTOM_USER=${CHROME_USER}
      - PASSWORD=${CHROME_PASSWORD}
      - CHROME_CLI=--remote-debugging-port=9222 --remote-debugging-address=0.0.0.0 --remote-allow-origins=* --disable-blink-features=AutomationControlled
    volumes:
      - ./data/chrome-profile:/config
      - ./chrome-init.d:/custom-cont-init.d:ro
    ports:
      - "3000:3000"
      - "3001:3001"
    networks:
      openclaw-net:
        ipv4_address: 172.28.0.10

networks:
  openclaw-net:
    ipam:
      config:
        - subnet: 172.28.0.0/16
