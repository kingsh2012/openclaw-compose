services:
  openclaw-gateway:
    container_name: openclaw-gateway
    image: alpine/openclaw:2026.5.22
    environment:
      HOME: /home/node
      OPENCLAW_DISABLE_BONJOUR: "1"
      TZ: Asia/Shanghai
    volumes:
      - ./data:/home/node/.openclaw
    ports:
      - "18789:18789"
    init: true
    restart: unless-stopped
    depends_on:
      - chrome
    command:
      ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  chrome:
    image: chromedp/headless-shell:latest
    container_name: openclaw-chromedp
    restart: unless-stopped
    shm_size: 2gb
    environment:
      - TZ=Asia/Shanghai
