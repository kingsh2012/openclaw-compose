services:
  ollama-embedding:
    image: ollama/ollama:latest
    container_name: ollama-embedding
    restart: unless-stopped
    ports:
      # 如果只给本机 OpenClaw 用，建议用 127.0.0.1:11434:11434
      # 如果要给另一台 OpenClaw 访问，可以改成 0.0.0.0:11434:11434 或 11434:11434
      # 但必须用防火墙限制来源 IP
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  ollama-pull-bge-m3:
    image: ollama/ollama:latest
    container_name: ollama-pull-bge-m3
    depends_on:
      ollama-embedding:
        condition: service_healthy
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama-embedding:11434
    entrypoint: ["/bin/ollama"]
    command: ["pull", "bge-m3"]
    restart: "no"
